const EMPTY_FORM = {
  subdomain: '', forward_host: '', forward_port: '',
  forward_scheme: 'http', websocket: false, ssl_verify_off: false,
};

function ServicesPanel({ toast, onMutate }) {
  const { confirm, dialog: confirmDialog } = useConfirm();
  const [scan, setScan]           = useState(null);
  const [baseDomain, setBaseDomain] = useState('');
  const [loading, setLoading]     = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [showAdd, setShowAdd]     = useState(false);
  const [addError, setAddError]   = useState('');
  const [showBatch, setShowBatch] = useState(false);
  const [created, setCreated]     = useState(null);
  const [form, setForm]           = useState(EMPTY_FORM);
  const [saving, setSaving]       = useState(false);
  const [fixingDns, setFixingDns] = useState(null);
  const [actingHost, setActingHost] = useState(null);
  const [batchText, setBatchText] = useState(`[
  {"subdomain":"app1","forward_host":"192.168.1.100","forward_port":8080,"forward_scheme":"http","websocket":false,"ssl_verify_off":false}
]`);
  const [batchPlan, setBatchPlan] = useState(null);
  const [batchError, setBatchError] = useState('');
  const [batchContinue, setBatchContinue] = useState(false);
  const [svcFilter, setSvcFilter] = useState('');
  const [trashItems, setTrashItems] = useState([]);
  const [restoringId, setRestoringId] = useState(null);

  const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const load = useCallback(async (soft) => {
    if (soft) setRefreshing(true);
    else setLoading(true);
    try {
      const [sc, tr, cfg] = await Promise.all([
        api('GET', '/api/scan'),
        api('GET', '/api/trash').catch(() => ({ items: [] })),
        api('GET', '/api/config'),
      ]);
      setScan(sc);
      setTrashItems(tr.items || []);
      setBaseDomain(cfg.domain || '');
    } catch (e) { toast(e.message, 'err'); }
    finally { setLoading(false); setRefreshing(false); }
  }, [toast]);

  useEffect(() => { load(); }, [load]);

  const add = async () => {
    if (!form.subdomain || !form.forward_host || !form.forward_port) return;
    setAddError('');
    if (!validateSubdomain(form.subdomain)) {
      setAddError('Subdomain must be lowercase letters, numbers, and hyphens only');
      return;
    }
    if (!validatePort(form.forward_port)) {
      setAddError('Port must be an integer from 1 to 65535');
      return;
    }
    setSaving(true);
    try {
      const res = await api('POST', '/api/services', { ...form, forward_port: Number(form.forward_port) });
      toast(`${res.domain} created`, 'ok');
      setCreated(res);
      setShowAdd(false); setForm(EMPTY_FORM); setAddError('');
      load(true); onMutate();
    } catch (e) { setAddError(e.message); }
    finally { setSaving(false); }
  };

  // Add missing DNS record for an existing NPM proxy host.
  // Uses npm_host from the scan response so the IP is always consistent.
  const addDnsForService = async (domain) => {
    const npmHost = scan?.npm_host;
    setFixingDns(domain);
    try {
      await api('POST', '/api/dns', { name: domain, content: npmHost, proxied: false });
      toast(`DNS added: ${domain} → ${npmHost}`, 'ok');
      load(true); onMutate();
    } catch (e) { toast(e.message, 'err'); }
    finally { setFixingDns(null); }
  };

  const toggleEnabled = async (host) => {
    const domain = host.domain_names?.[0] || `#${host.id}`;
    setActingHost(host.id);
    try {
      await api('POST', `/api/services/${host.id}/enabled`, { enabled: !host.enabled });
      toast(`${domain} ${host.enabled ? 'disabled' : 'enabled'}`, 'ok');
      load(true); onMutate();
    } catch (e) { toast(e.message, 'err'); }
    finally { setActingHost(null); }
  };

  const deleteService = async (serviceEntry) => {
    const host = serviceEntry.proxy_host;
    const domain = host.domain_names?.[0];
    if (!domain) return;
    const ok = await confirm({
      title: 'Delete service?',
      message: `Remove ${domain}?\n\nThis deletes the NPM proxy host and the matching Cloudflare DNS A record.`,
      confirmLabel: 'Delete',
      danger: true,
    });
    if (!ok) return;

    setActingHost(host.id);
    try {
      const res = await api('POST', '/api/services/delete', {
        proxy_host_id: host.id,
        domain,
        dns_record_id: serviceEntry.dns_record?.id || null,
      });
      if (res.dns_error) {
        toast(
          `${domain} removed from NPM, but DNS delete failed: ${res.dns_error}. Remove the A record manually if it still exists.`,
          'warn',
        );
      } else {
        toast(`${domain} deleted`, 'ok');
      }
      load(true); onMutate();
    } catch (e) { toast(e.message, 'err'); }
    finally { setActingHost(null); }
  };

  const restoreTrash = async (entry) => {
    if (!entry?.id) return;
    const ok = await confirm({
      title: 'Restore service?',
      message: `Recreate ${entry.domain} from snapshot?\n\nThis adds DNS and an NPM proxy host again.`,
      confirmLabel: 'Restore',
    });
    if (!ok) return;
    setRestoringId(entry.id);
    try {
      await api('POST', `/api/trash/${entry.id}/restore`, {});
      toast(`${entry.domain} restored`, 'ok');
      load(true); onMutate();
    } catch (e) { toast(e.message, 'err'); }
    finally { setRestoringId(null); }
  };

  const parseBatch = () => {
    try {
      const data = JSON.parse(batchText);
      if (!Array.isArray(data)) throw new Error('Batch JSON must be an array');
      return data;
    } catch (e) {
      throw new Error(`Invalid JSON: ${e.message}`);
    }
  };

  const previewBatch = async () => {
    setBatchError('');
    try {
      const items = parseBatch();
      const res = await api('POST', '/api/services/batch', { items, dry_run: true, continue_on_error: batchContinue });
      setBatchPlan(res.plan || []);
      toast(`Preview ready (${(res.plan || []).length} items)`, 'ok');
    } catch (e) {
      setBatchError(e.message);
    }
  };

  const runBatch = async () => {
    setBatchError('');
    try {
      const items = parseBatch();
      const res = await api('POST', '/api/services/batch', { items, dry_run: false, continue_on_error: batchContinue });
      const ok = (res.created || []).length;
      const bad = (res.failed || []).length;
      if (bad > 0) {
        const lines = (res.failed || []).map(f => `${f.domain || '?'}: ${f.error || 'failed'}`);
        setBatchError(`Created ${ok}, failed ${bad}:\n${lines.join('\n')}`);
        setBatchPlan(res.plan || null);
      } else {
        toast(`Batch finished: ${ok} created`, 'ok');
        setShowBatch(false);
        setBatchPlan(null);
        load(true); onMutate();
      }
    } catch (e) {
      setBatchError(e.message);
    }
  };

  const services      = scan?.services        || [];
  const unmatchedDns  = scan?.unmatched_dns   || [];
  const passthroughDns = scan?.passthrough_dns || [];
  const scanDnsTruncated = scan?.dns_truncated === true;
  const sq = (svcFilter || '').trim().toLowerCase();
  const servicesF = !sq ? services : services.filter((serviceEntry) => {
    const h = serviceEntry.proxy_host;
    const domain = (h?.domain_names?.[0] || '').toLowerCase();
    const back = `${h?.forward_scheme || ''}://${h?.forward_host || ''}:${h?.forward_port || ''}`.toLowerCase();
    return domain.includes(sq) || back.includes(sq);
  });
  const unmatchedF = !sq ? unmatchedDns : unmatchedDns.filter(r =>
    (r.name || '').toLowerCase().includes(sq) || (r.content || '').toLowerCase().includes(sq),
  );
  const passthroughF = !sq ? passthroughDns : passthroughDns.filter(r =>
    (r.name || '').toLowerCase().includes(sq) || (r.content || '').toLowerCase().includes(sq),
  );

  const domainSuffix = baseDomain ? `.${baseDomain}` : '.yourdomain.com';

  return (
    <>
      {confirmDialog}
      <div className="panel-header">
        <div>
          <div className="panel-title">Services</div>
          <div className="panel-desc">Create, enable/disable, delete, or batch-import services (DNS + NPM proxy host)</div>
        </div>
        <div className="panel-actions">
          <PanelRefreshButton onClick={() => load(true)} loading={loading} refreshing={refreshing} />
          <input className="toolbar-search" type="search" placeholder="Filter services…" value={svcFilter}
            onChange={e => setSvcFilter(e.target.value)} aria-label="Filter services" />
          <button className="btn btn-ghost" onClick={() => setShowBatch(true)}>Batch Import</button>
          <button className="btn btn-primary" onClick={() => { setAddError(''); setShowAdd(true); }}>+ New Service</button>
        </div>
      </div>

      <TofuManagedDnsBanner />

      {scanDnsTruncated && (
        <div className="quota-banner">
          DNS scan may be incomplete (pagination limit). Unmatched or passthrough DNS rows could be missing.
        </div>
      )}

      {/* Recently deleted — restore snapshot */}
      {trashItems.length > 0 && (
        <div style={{ marginBottom: '20px' }}>
          <div className="section-label">Recently deleted (restore)</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Domain</th><th>Deleted</th><th></th></tr></thead>
              <tbody>
                {trashItems.map((t) => (
                  <tr key={t.id}>
                    <td><span className="mono">{t.domain}</span></td>
                    <td><span className="mono activity-ts">{t.ts || '—'}</span></td>
                    <td className="td-actions">
                      <button
                        className="btn btn-ghost btn-sm"
                        disabled={restoringId === t.id}
                        onClick={() => restoreTrash(t)}
                      >{restoringId === t.id ? '…' : 'Restore'}</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Main services table */}
      {loading ? <div className="loading">loading</div>
      : scan === null ? <div className="empty">Could not load services — check the backend logs.</div>
      : services.length === 0 ? <div className="empty">No services configured yet. Use the button above to add the first one.</div>
      : servicesF.length === 0 ? <div className="empty">No services match this filter.</div>
      : (
        <div className={`table-wrap ${refreshing ? 'table-dim' : ''}`}>
          <table>
            <thead><tr><th>Domain</th><th>Backend</th><th>DNS</th><th>SSL</th><th>WS</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {servicesF.map((serviceEntry) => {
                const { proxy_host: h, status } = serviceEntry;
                const domain = h.domain_names?.[0];
                return (
                  <tr key={h.id}>
                    <td><span className="mono">{domain}</span></td>
                    <td><span className="ip-cell">{h.forward_scheme}://{h.forward_host}:{h.forward_port}</span></td>
                    <td>
                      {status === 'ok'
                        ? <span className="badge badge-green">✓ dns</span>
                        : <span className="cell-action">
                            <span className="badge badge-warn">missing</span>
                            <button className="btn btn-ghost btn-sm"
                              onClick={() => addDnsForService(domain)}
                              disabled={fixingDns === domain}>
                              {fixingDns === domain ? '…' : 'Add DNS'}
                            </button>
                          </span>
                      }
                    </td>
                    <td>{h.certificate_id > 0 ? <span className="badge badge-green">ssl</span> : <span className="badge badge-gray">none</span>}</td>
                    <td>{h.allow_websocket_upgrade ? <span className="badge badge-blue">ws</span> : <span className="badge badge-gray">—</span>}</td>
                    <td>{h.enabled ? <span className="badge badge-green">● online</span> : <span className="badge badge-gray">● off</span>}</td>
                    <td className="td-actions">
                      <span className="cell-action" style={{ justifyContent: 'flex-end' }}>
                        <button
                          className="btn btn-ghost btn-sm"
                          onClick={() => toggleEnabled(h)}
                          disabled={actingHost === h.id}
                        >
                          {actingHost === h.id ? '…' : (h.enabled ? 'Disable' : 'Enable')}
                        </button>
                        <button
                          className="btn btn-danger btn-sm"
                          onClick={() => deleteService(serviceEntry)}
                          disabled={actingHost === h.id}
                        >
                          Delete
                        </button>
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Unmatched DNS: A records → NPM IP with no proxy host (orphaned/half-configured) */}
      {unmatchedDns.length > 0 && (
        <>
          <div className="section-label warn">⚠ DNS → NPM with no proxy host ({unmatchedDns.length})</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>IP</th><th>Note</th></tr></thead>
              <tbody>
                {unmatchedF.length === 0 ? (
                  <tr><td colSpan="3" className="empty" style={{ border: 'none' }}>No rows match this filter.</td></tr>
                ) : unmatchedF.map(r => (
                  <tr key={r.id}>
                    <td><span className="mono">{r.name}</span></td>
                    <td><span className="ip-cell">{r.content}</span></td>
                    <td><span className="badge badge-warn">no proxy host — orphaned?</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* Passthrough DNS: A records NOT → NPM (intentional: Cloudflare Workers, etc.) */}
      {passthroughDns.length > 0 && (
        <>
          <div className="section-label">Cloudflare-only records ({passthroughDns.length})</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>IP</th><th>Note</th></tr></thead>
              <tbody>
                {passthroughF.length === 0 ? (
                  <tr><td colSpan="3" className="empty" style={{ border: 'none' }}>No rows match this filter.</td></tr>
                ) : passthroughF.map(r => (
                  <tr key={r.id}>
                    <td><span className="mono">{r.name}</span></td>
                    <td><span className="ip-cell">{r.content}</span></td>
                    <td><span className="badge badge-gray">no NPM host expected</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* New Service modal */}
      {showAdd && (
        <Modal title="New Service" onClose={() => { setShowAdd(false); setAddError(''); }}>
          <ModalError error={addError} onDismiss={() => setAddError('')} />
          <div className="grid2">
            <div className="field span2">
              <label>Subdomain</label>
              <div className="field-prefix">
                <input type="text" placeholder="myservice" value={form.subdomain} autoFocus
                  className={form.subdomain && !validateSubdomain(form.subdomain) ? 'input-invalid' : ''}
                  onChange={e => setField('subdomain', e.target.value.toLowerCase().replace(/[^a-z0-9\-]/g,'').replace(/^-+/,''))} />
                <span className="field-suf">{domainSuffix}</span>
              </div>
              {form.subdomain && !validateSubdomain(form.subdomain) && (
                <div className="field-err">Use lowercase letters, numbers, and hyphens only</div>
              )}
              <div className="field-hint">Subdomain only — base domain is appended automatically.</div>
            </div>
            <div className="field">
              <label>Backend Scheme</label>
              <select value={form.forward_scheme} onChange={e => setField('forward_scheme', e.target.value)}>
                <option value="http">http</option>
                <option value="https">https</option>
              </select>
            </div>
            <div className="field">
              <label>Backend Host</label>
              <input type="text" placeholder="192.168.1.100" value={form.forward_host}
                onChange={e => setField('forward_host', e.target.value)} />
            </div>
            <div className="field span2">
              <label>Backend Port</label>
              <input type="number" placeholder="8080" value={form.forward_port}
                className={form.forward_port !== '' && form.forward_port != null && !validatePort(form.forward_port) ? 'input-invalid' : ''}
                onChange={e => setField('forward_port', e.target.value)}
                onKeyDown={e => e.key === 'Enter' && add()} />
              {form.forward_port !== '' && form.forward_port != null && !validatePort(form.forward_port) && (
                <div className="field-err">Port must be 1–65535</div>
              )}
            </div>
            <div className="field span2">
              <label className="check-row label-plain">
                <input type="checkbox" checked={form.websocket} onChange={e => setField('websocket', e.target.checked)} />
                <span>Enable WebSocket support</span>
              </label>
            </div>
            <div className="field span2">
              <label className="check-row label-plain">
                <input type="checkbox" checked={form.ssl_verify_off} onChange={e => setField('ssl_verify_off', e.target.checked)} />
                <span>Disable SSL verification — for self-signed backend certs (Portainer, Cockpit, Vaultwarden)</span>
              </label>
            </div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-ghost" onClick={() => setShowAdd(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={add}
              disabled={
                saving || !form.subdomain || !form.forward_host || !form.forward_port
                || !validateSubdomain(form.subdomain) || !validatePort(form.forward_port)
              }>
              {saving ? 'Creating…' : 'Create Service'}
            </button>
          </div>
        </Modal>
      )}

      {showBatch && (
        <Modal title="Batch Import Services" onClose={() => { setShowBatch(false); setBatchPlan(null); setBatchError(''); }} wide>
          <ModalError error={batchError} onDismiss={() => setBatchError('')} />
          <div className="field">
            <label>JSON Array</label>
            <textarea
              value={batchText}
              onChange={e => setBatchText(e.target.value)}
              style={{ width: '100%', minHeight: '180px', background: 'var(--bg)', border: '1px solid var(--border2)', color: 'var(--text)', borderRadius: 'var(--radius)', padding: '10px', fontFamily: 'var(--mono)', fontSize: '12px' }}
            />
            <div className="field-hint">Each item uses the same fields as New Service: subdomain, forward_host, forward_port, forward_scheme, websocket, ssl_verify_off.</div>
          </div>
          <div className="field">
            <label className="check-row label-plain">
              <input type="checkbox" checked={batchContinue} onChange={e => setBatchContinue(e.target.checked)} />
              <span>Continue on error (otherwise stop at first failure)</span>
            </label>
          </div>
          {batchPlan && (
            <div className="table-wrap" style={{ marginTop: '10px' }}>
              <table>
                <thead><tr><th>Domain</th><th>Backend</th><th>Warnings</th></tr></thead>
                <tbody>
                  {batchPlan.map((p, idx) => (
                    <tr key={`${p.domain}-${idx}`}>
                      <td><span className="mono">{p.domain}</span></td>
                      <td><span className="ip-cell">{p.backend}</span></td>
                      <td>{(p.warnings || []).length ? <span className="badge badge-warn">{p.warnings.join(', ')}</span> : <span className="badge badge-green">ok</span>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <div className="modal-footer">
            <button className="btn btn-ghost" onClick={previewBatch}>Preview</button>
            <button className="btn btn-primary" onClick={runBatch}>Run Import</button>
          </div>
        </Modal>
      )}

      {created && (
        <Modal title="Service created" onClose={() => setCreated(null)} wide>
          <div className="field-hint" style={{ marginBottom: '12px' }}>
            <div style={{ color: 'var(--text)', fontFamily: 'var(--mono)' }}>{created.domain}</div>
            <div style={{ marginTop: '6px' }}>Backend: <span className="mono">{created.backend}</span></div>
            <div style={{ marginTop: '6px' }}>URL: <span className="mono">https://{created.domain}</span></div>
          </div>

          <ServiceCreatedChecklist created={created} integrations={scan} toast={toast} />

          <div className="modal-footer">
            <button className="btn btn-ghost" onClick={() => {
              navigator.clipboard?.writeText(`https://${created.domain}`).then(
                () => toast('Copied URL', 'ok'),
                () => toast('Copy failed', 'err')
              );
            }}>Copy URL</button>
            <button className="btn btn-primary" onClick={() => setCreated(null)}>Done</button>
          </div>
        </Modal>
      )}
    </>
  );
}


// ── Integrations health (header) + Activity feed ─────────────────────────────

function HeaderStatusStrip() {
  const [health, setHealth] = useState(null);
  const [metrics, setMetrics] = useState(null);
  const tick = useCallback(async () => {
    const [hRes, mRes] = await Promise.allSettled([
      api('GET', '/api/integrations/health'),
      api('GET', '/api/metrics'),
    ]);
    setHealth(hRes.status === 'fulfilled' ? hRes.value : null);
    setMetrics(mRes.status === 'fulfilled' ? mRes.value : null);
  }, []);
  useEffect(() => {
    tick();
    const id = setInterval(tick, 45000);
    return () => clearInterval(id);
  }, [tick]);
  if (!health && !metrics) return null;
  const cf = health?.cloudflare || {};
  const npm = health?.npm || {};
  const apiN = metrics?.http_requests_total ?? 0;
  const recN = metrics?.reconcile_runs_total ?? 0;
  const last = metrics?.reconcile_last_iso
    || (metrics?.reconcile_last_unix != null
      ? new Date(metrics.reconcile_last_unix * 1000).toLocaleString()
      : 'never');
  const metricsTip = `In-memory counters (reset on container restart).\nAPI requests: ${apiN}\nReconcile scans: ${recN}\nLast reconcile: ${last}`;
  return (
    <div className="health-strip">
      {health && (
        <>
          <span className={`health-pill ${cf.ok ? 'ok' : 'err'}`} title={`Last check: ${health.checked_at || ''}`}>
            CF {cf.ok ? 'ok' : 'fail'}{cf.latency_ms != null ? ` ${cf.latency_ms}ms` : ''}
          </span>
          <span className={`health-pill ${npm.ok ? 'ok' : 'err'}`} title={`Last check: ${health.checked_at || ''}`}>
            NPM {npm.ok ? 'ok' : 'fail'}{npm.latency_ms != null ? ` ${npm.latency_ms}ms` : ''}
          </span>
        </>
      )}
      {metrics && (
        <>
          <span className="health-pill muted" title={metricsTip}>API {apiN}</span>
          <span className="health-pill muted" title={metricsTip}>Reconcile {recN}</span>
        </>
      )}
    </div>
  );
}

function ActivityRow({ ev }) {
  const [open, setOpen] = useState(false);
  const summary = formatActivityEvent(ev);
  const hasDetail = ev.detail && Object.keys(ev.detail).length > 0;
  return (
    <div className="activity-row">
      <div className="activity-ts">{ev.ts}{ev.request_id ? <> · <span style={{ opacity: 0.55 }}>{ev.request_id}</span></> : null}</div>
      <div>{summary}</div>
      {hasDetail && (
        <>
          <button type="button" className="activity-toggle" onClick={() => setOpen(!open)}>
            {open ? 'Hide details' : 'Show details'}
          </button>
          {open && <div className="activity-detail">{JSON.stringify(ev.detail, null, 2)}</div>}
        </>
      )}
    </div>
  );
}

function ActivityPanel({ toast }) {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const load = useCallback(async (soft) => {
    if (soft) setRefreshing(true);
    else setLoading(true);
    try {
      const r = await api('GET', '/api/activity?limit=150');
      setEvents(r.events || []);
    } catch (e) { toast(e.message, 'err'); }
    finally { setLoading(false); setRefreshing(false); }
  }, [toast]);
  useEffect(() => { load(); }, [load]);
  return (
    <>
      <div className="panel-header">
        <div>
          <div className="panel-title">Activity</div>
          <div className="panel-desc">Recent changes made through this console</div>
        </div>
        <PanelRefreshButton onClick={() => load(true)} loading={loading} refreshing={refreshing} />
      </div>
      {loading ? <div className="loading">loading</div>
      : events.length === 0 ? <div className="empty">No events yet.</div>
      : (
        <div className={`activity-list ${refreshing ? 'table-dim' : ''}`}>
          {events.map((ev, i) => (
            <ActivityRow key={`${ev.ts}-${i}`} ev={ev} />
          ))}
        </div>
      )}
    </>
  );
}


// ── App root ──────────────────────────────────────────────────────────────────
// Lifecycle:
//   'loading'  → checking /api/config/status on mount
//   'wizard'   → not configured; shows WizardScreen (full page, no tabs)
//   'ready'    → configured; shows main app with header/tabs/panels

function App() {
  const [appState, setAppState]     = useState('loading');
  const [tab, setTab]               = useState('links');
  const [counts, setCounts]         = useState({ links: null, dns: null, services: null });
  const [showSettings, setShowSettings] = useState(false);
  const [linksListExists, setLinksListExists] = useState(false);
  const [sessionSecretSource, setSessionSecretSource] = useState('');
  const { toasts, add: toast }      = useToast();

  const boot = useCallback(async () => {
    try {
      const r = await fetch('/api/auth/status', { credentials: 'same-origin' });
      const s = await r.json();
      CSRF_TOKEN = s.csrf_token || '';
      setSessionSecretSource(s.session_secret_source || '');
      if (!s.configured) {
        setAppState('wizard');
        return;
      }
      if (s.login_required && !s.authenticated) {
        setAppState('login');
        return;
      }
      setAppState('ready');
    } catch {
      setAppState('wizard');
    }
  }, []);

  useEffect(() => { boot(); }, [boot]);

  // Fetch tab badge counts in parallel.  Uses allSettled so one failure
  // doesn't suppress the others (e.g. CF down but NPM still accessible).
  const refreshCounts = useCallback(async () => {
    const [links, dns, scanRes, preRes] = await Promise.allSettled([
      api('GET', '/api/links'),
      api('GET', '/api/dns'),
      api('GET', '/api/scan'),
      api('GET', '/api/links/preflight'),
    ]);
    setCounts({
      links:    links.status    === 'fulfilled' ? (links.value.items?.length    ?? 0) : null,
      dns:      dns.status      === 'fulfilled' ? ((dns.value.records || []).length) : null,
      services: scanRes.status  === 'fulfilled' ? ((scanRes.value.services || []).length) : null,
    });
    if (preRes.status === 'fulfilled') {
      setLinksListExists(!!preRes.value.list_exists);
    }
  }, []);

  useEffect(() => {
    if (appState === 'ready') refreshCounts();
  }, [appState, refreshCounts]);

  // ── Loading state ──
  if (appState === 'loading') return (
    <>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',
        color:'var(--text-3)',fontFamily:'var(--mono)',fontSize:'12px'}}>
        loading
      </div>
      <ToastList toasts={toasts} />
    </>
  );

  // ── Wizard state ──
  if (appState === 'wizard') return (
    <>
      <WizardScreen toast={toast} onComplete={() => { setAppState('ready'); }} />
      <ToastList toasts={toasts} />
    </>
  );

  // ── Login gate ──
  if (appState === 'login') return (
    <>
      <LoginScreen toast={toast} onAuthed={() => setAppState('ready')} />
      <ToastList toasts={toasts} />
    </>
  );

  // ── Ready state ──
  const TABS = [
    { id: 'links',    label: 'Short Links', count: counts.links    },
    { id: 'dns',      label: 'DNS',         count: counts.dns      },
    { id: 'services', label: 'Services',    count: counts.services },
    { id: 'activity', label: 'Activity',    count: null },
  ];

  return (
    <>
      <header className="header">
        <span className="header-logo">🔗</span>
        <div>
          <div className="header-title">URLER</div>
          <div className="header-sub">app console</div>
        </div>
        <div className="header-spacer" />
        <HeaderStatusStrip />
        <div className="header-status">
          <span className="status-dot" />
          ready
        </div>
        <button className="btn btn-ghost btn-sm" style={{ marginLeft: 8 }} onClick={async () => {
          try { await api('POST', '/api/auth/logout', null); } catch { /* ignore */ }
          CSRF_TOKEN = '';
          setAppState('login');
        }} title="Sign out">Sign out</button>
        <button className="gear-btn" onClick={() => setShowSettings(true)} title="Settings">⚙</button>
      </header>

      <nav className="tabs">
        {TABS.map(t => (
          <div key={t.id} className={`tab ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
            {t.label}
            {t.count !== null && <span className="tab-count">{t.count}</span>}
          </div>
        ))}
      </nav>

      <GettingStartedBanner listExists={linksListExists} sessionSecretSource={sessionSecretSource} />

      <main className="main">
        {/* Each panel mounts on tab activation and unmounts on switch,
            giving a fresh data load on each visit — no stale state. */}
        {tab === 'links'    && <LinksPanel    toast={toast} onMutate={refreshCounts} />}
        {tab === 'dns'      && <DNSPanel      toast={toast} onMutate={refreshCounts} />}
        {tab === 'services' && <ServicesPanel toast={toast} onMutate={refreshCounts} />}
        {tab === 'activity' && <ActivityPanel toast={toast} />}
      </main>

      {showSettings && (
        <SettingsModal toast={toast} onClose={() => setShowSettings(false)} />
      )}

      <ToastList toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
