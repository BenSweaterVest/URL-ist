<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>URLer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #07090f;
    --surface:  #0d1220;
    --surface2: #121c30;
    --border:   #1a2740;
    --border2:  #223352;
    --accent:   #38bdf8;
    --accent-d: #0ea5e9;
    --text:     #dde8f5;
    --text-2:   #7b96bc;
    --text-3:   #3d5478;
    --ok:       #34d399;
    --err:      #f87171;
    --warn:     #fbbf24;
    --radius:   6px;
    --mono:     'Azeret Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  #root { min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  .header { display: flex; align-items: center; gap: 12px; padding: 0 24px; height: 52px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .header-logo { font-size: 22px; line-height: 1; }
  .header-title { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.05em; }
  .header-sub { font-family: var(--mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.08em; margin-left: 2px; }
  .header-spacer { flex: 1; }
  .header-status { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: var(--mono); color: var(--text-3); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .gear-btn { width: 28px; height: 28px; border-radius: var(--radius); background: transparent; border: 1px solid var(--border2); color: var(--text-3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; margin-left: 8px; }
  .gear-btn:hover { color: var(--text); background: var(--surface2); border-color: var(--border2); }

  /* ── Tabs ── */
  .tabs { display: flex; align-items: flex-end; gap: 2px; padding: 0 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .tab { padding: 10px 18px 9px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-3); border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; letter-spacing: 0.04em; text-transform: uppercase; user-select: none; }
  .tab:hover { color: var(--text-2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-count { display: inline-flex; align-items: center; justify-content: center; background: var(--border2); color: var(--text-2); font-size: 10px; font-family: var(--mono); min-width: 16px; height: 16px; border-radius: 8px; padding: 0 4px; margin-left: 6px; vertical-align: 1px; }

  /* ── Main ── */
  .main { flex: 1; padding: 24px; overflow-y: auto; max-width: 1100px; width: 100%; margin: 0 auto; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .panel-title { font-size: 16px; font-weight: 600; }
  .panel-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; font-family: var(--mono); }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; font-family: var(--sans); }
  .btn-primary { background: var(--accent-d); color: #fff; border-color: var(--accent-d); }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border2); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: transparent; color: var(--err); border-color: transparent; padding: 4px 8px; }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* ── Tables ── */
  .table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  td { padding: 11px 14px; border-top: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:hover td { background: rgba(56,189,248,0.03); }
  .mono { font-family: var(--mono); font-size: 12px; }
  .slug { color: var(--accent); font-family: var(--mono); font-size: 12px; font-weight: 500; }
  .slug-link { color: var(--accent); font-family: var(--mono); font-size: 13px; font-weight: 500; text-decoration: none; }
  .slug-link:hover { text-decoration: underline; }
  .checklist-block { margin-bottom: 14px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); }
  .checklist-block-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .snippet-pre { margin: 8px 0 0; padding: 10px; background: var(--surface2); border-radius: var(--radius); font-family: var(--mono); font-size: 11px; line-height: 1.5; white-space: pre-wrap; color: var(--text-2); }
  .url-cell { color: var(--text-2); font-family: var(--mono); font-size: 11px; max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ip-cell { color: var(--text-2); font-family: var(--mono); font-size: 12px; }
  .td-actions { text-align: right; width: 60px; }
  .cell-action { display: flex; align-items: center; gap: 6px; }

  /* ── Empty / Loading ── */
  .empty { padding: 40px; text-align: center; color: var(--text-3); font-size: 13px; }
  .loading { padding: 40px; text-align: center; color: var(--text-3); font-size: 12px; font-family: var(--mono); }
  .loading::after { content: ''; animation: dots 1.2s steps(3, end) infinite; }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

  /* ── Toasts ── */
  .toast-wrap { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
  .toast { padding: 10px 16px; border-radius: var(--radius); font-size: 12px; font-family: var(--mono); border: 1px solid; max-width: 380px; animation: toast-in 0.2s ease; }
  .toast.ok  { background: rgba(52,211,153,0.1); border-color: var(--ok);  color: var(--ok);  }
  .toast.err { background: rgba(248,113,113,0.1); border-color: var(--err); color: var(--err); }
  .toast.warn { background: rgba(251,191,36,0.12); border-color: var(--warn); color: var(--warn); }
  @keyframes toast-in { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* ── Modals ── */
  .overlay { position: fixed; inset: 0; background: rgba(7,9,15,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; width: 100%; max-width: 460px; padding: 24px; }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }

  /* ── Forms ── */
  .field { margin-bottom: 16px; }
  .field:last-of-type { margin-bottom: 0; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  label.label-plain { text-transform: none; letter-spacing: normal; font-weight: 400; }
  input[type=text], input[type=number], input[type=password], select { width: 100%; background: var(--bg); border: 1px solid var(--border2); color: var(--text); border-radius: var(--radius); padding: 8px 10px; font-size: 13px; font-family: var(--mono); outline: none; transition: border-color 0.15s; }
  input:focus, select:focus { border-color: var(--accent-d); }
  input::placeholder { color: var(--text-3); }
  select { cursor: pointer; }
  select option { background: var(--surface); }
  .field-hint { font-size: 11px; color: var(--text-3); margin-top: 5px; font-family: var(--mono); line-height: 1.5; }
  .field-prefix { display: flex; align-items: center; }
  .field-pre { background: var(--surface2); border: 1px solid var(--border2); border-right: none; border-radius: var(--radius) 0 0 var(--radius); padding: 8px 10px; font-size: 11px; font-family: var(--mono); color: var(--text-3); white-space: nowrap; }
  .field-suf { background: var(--surface2); border: 1px solid var(--border2); border-left: none; border-radius: 0 var(--radius) var(--radius) 0; padding: 8px 10px; font-size: 11px; font-family: var(--mono); color: var(--text-3); white-space: nowrap; }
  .field-prefix input { border-radius: 0; }
  .field-prefix input:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
  .check-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .check-row input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent-d); flex-shrink: 0; }
  .check-row span { font-size: 12px; color: var(--text-2); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid2 .span2 { grid-column: 1 / -1; }

  /* ── Badges ── */
  .badge { display: inline-flex; align-items: center; font-size: 10px; font-family: var(--mono); padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .badge-blue  { background: rgba(56,189,248,0.12); color: var(--accent); }
  .badge-green { background: rgba(52,211,153,0.12); color: var(--ok); }
  .badge-gray  { background: var(--border); color: var(--text-3); }
  .badge-warn  { background: rgba(251,191,36,0.12); color: var(--warn); }
  .section-label { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin: 20px 0 10px; }
  .section-label.warn { color: var(--warn); }

  .health-strip { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .health-pill { font-size: 10px; font-family: var(--mono); padding: 3px 8px; border-radius: 10px; border: 1px solid var(--border2); color: var(--text-2); white-space: nowrap; }
  .health-pill.ok { border-color: rgba(52,211,153,0.35); color: var(--ok); }
  .health-pill.err { border-color: rgba(248,113,113,0.35); color: var(--err); }
  .health-pill.muted { color: var(--text-3); }

  .table-pager { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 12px; font-size: 12px; color: var(--text-3); font-family: var(--mono); }
  .table-pager-actions { display: flex; gap: 8px; }
  .toolbar-search { width: 200px; padding: 6px 10px; font-size: 12px; }
  input.input-invalid { border-color: var(--err) !important; }
  .field-err { font-size: 11px; color: var(--err); margin-top: 4px; font-family: var(--mono); }
  .activity-list { font-size: 12px; font-family: var(--mono); color: var(--text-2); line-height: 1.6; }
  .activity-row { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .activity-row:last-child { border-bottom: none; }
  .activity-ts { color: var(--text-3); font-size: 10px; }
  .activity-detail { font-size: 10px; color: var(--text-3); margin-top: 4px; word-break: break-all; }
  .activity-toggle { background: none; border: none; color: var(--accent); font-size: 10px; cursor: pointer; padding: 0; margin-top: 4px; font-family: var(--mono); }

  .modal-error { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.35); color: var(--err); padding: 10px 12px; border-radius: var(--radius); font-size: 12px; font-family: var(--mono); line-height: 1.5; margin-bottom: 16px; white-space: pre-wrap; word-break: break-word; }
  .confirm-body { font-size: 13px; color: var(--text-2); line-height: 1.55; margin-bottom: 16px; white-space: pre-wrap; }
  .confirm-input { margin-top: 12px; }

  .getting-started { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin: 0 24px 0; padding: 14px 16px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); flex-shrink: 0; max-width: 1100px; width: calc(100% - 48px); margin-left: auto; margin-right: auto; margin-top: 16px; }
  .getting-started ol { margin: 8px 0 0 18px; padding: 0; font-size: 12px; color: var(--text-2); line-height: 1.7; }
  .getting-started li.done { color: var(--text-3); text-decoration: line-through; }
  .getting-started-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .quota-banner { margin-bottom: 16px; padding: 12px 14px; border-radius: var(--radius); border: 1px solid rgba(251,191,36,0.35); background: rgba(251,191,36,0.08); font-size: 12px; color: var(--warn); line-height: 1.5; }
  .table-dim { opacity: 0.55; pointer-events: none; transition: opacity 0.15s; }
  .td-actions-wide { width: auto; min-width: 220px; }
  .link-url { color: var(--text); font-family: var(--mono); font-size: 11px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .panel-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ── Setup notice ── */
  .setup-notice { border: 1px dashed var(--border2); border-radius: var(--radius); padding: 24px; text-align: center; }
  .setup-notice h3 { color: var(--warn); font-size: 13px; margin-bottom: 8px; }
  .setup-notice p { color: var(--text-3); font-size: 12px; font-family: var(--mono); line-height: 1.6; }

  /* ── Setup Wizard ────────────────────────────────────────────────────────── */
  .wizard-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 24px; }
  .wizard { width: 100%; max-width: 620px; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 32px; }
  .wizard-brand { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .wizard-brand-icon { font-size: 30px; line-height: 1; }
  .wizard-brand-title { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--accent); letter-spacing: 0.05em; }
  .wizard-brand-sub { font-size: 12px; color: var(--text-3); margin-top: 3px; }
  .wizard-section { margin-bottom: 24px; }
  .wizard-section-title { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 14px; }
  .wizard-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }

  /* ── Connection test results ── */
  .test-block { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 16px 0; display: flex; flex-direction: column; gap: 8px; }
  .test-row { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; font-family: var(--mono); line-height: 1.4; }
  .test-row.ok  { color: var(--ok); }
  .test-row.err { color: var(--err); }
  .test-icon { flex-shrink: 0; margin-top: 1px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React 18 + Babel standalone for JSX (no build step required).
     Versions are pinned to the minor version for stability.
     SECURITY: For air-gapped or high-security deployments, download these
     files once and serve them from /static/vendor/ instead.
     See README for instructions. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
  integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
  integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"
  integrity="sha384-BcI7nduYchENm39cFMEVJXHEE7fwHONANyn/pY2YTa+BNtrWF2bKBZeI0wqVithi"
  crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── API wrapper ───────────────────────────────────────────────────────────────
// All calls go to relative paths so the frontend and backend share an origin.
// Network errors (backend down) and HTTP errors are both surfaced as thrown
// Error objects with actionable messages.

let CSRF_TOKEN = '';

const configTestPayload = (form) => ({
  cf_api_token:  form.cf_api_token,
  cf_account_id: form.cf_account_id,
  cf_zone_id:    form.cf_zone_id,
  npm_url:       form.npm_url,
  npm_email:     form.npm_email,
  npm_password:  form.npm_password,
  npm_cert_id:   form.npm_cert_id,
  domain:        form.domain,
  short_domain:  form.short_domain,
  cf_list_name:  form.cf_list_name,
});

const api = async (method, path, body) => {
  let r;
  try {
    const headers = body ? { 'Content-Type': 'application/json' } : {};
    if (!['GET','HEAD','OPTIONS'].includes(method) && CSRF_TOKEN) {
      headers['X-CSRF-Token'] = CSRF_TOKEN;
    }
    r = await fetch(path, {
      method,
      credentials: 'same-origin',
      headers,
      body:    body ? JSON.stringify(body) : undefined,
    });
  } catch (e) {
    throw new Error(`Network error — is the backend running? (${e.message})`);
  }
  if (!r.ok) {
    const data = await r.json().catch(() => ({ detail: r.statusText }));
    // FastAPI validation errors (422) return detail as an array of {msg, loc, type}.
    const msg = Array.isArray(data.detail)
      ? data.detail.map(e => e.msg).join('; ')
      : (data.detail || r.statusText);
    throw new Error(msg);
  }
  return r.json();
};

function validateSlug(s) {
  const v = (s || '').trim().toLowerCase();
  return /^[a-z0-9][a-z0-9\-_]*$/.test(v);
}
function validateSubdomain(s) {
  const v = (s || '').trim().toLowerCase();
  return /^[a-z0-9][a-z0-9\-]*$/.test(v);
}
function validatePort(p) {
  const n = Number(p);
  return Number.isFinite(n) && Number.isInteger(n) && n >= 1 && n <= 65535;
}
function targetUrlOk(s) {
  const v = (s || '').trim();
  return v.startsWith('https://') || v.startsWith('http://');
}

const DNS_PAGE_SIZE = 50;
const REDIRECT_STATUS_OPTIONS = [302, 301, 307, 308];

function redirectStatusHint(code) {
  if (code === 301) {
    return 'Permanent redirect — browsers cache aggressively; changing the destination later may not affect repeat visitors.';
  }
  if (code === 302) {
    return 'Temporary redirect (recommended) — you can change the destination later without browsers sticking to the old target.';
  }
  if (code === 307 || code === 308) {
    return 'Strict redirect — preserves the HTTP method; use only when you need that behavior.';
  }
  return '';
}

function shortLinkUrl(shortDomain, slug) {
  const host = (shortDomain || '').trim().replace(/^https?:\/\//, '').replace(/\/+$/, '');
  const s = (slug || '').replace(/^\//, '');
  if (!host || !s) return '';
  return `https://${host}/${s}`;
}

function trimUrlBase(u) {
  return (u || '').trim().replace(/\/+$/, '');
}

function integrationUrl(base, path) {
  const b = trimUrlBase(base);
  if (!b) return '';
  return `${b}${path.startsWith('/') ? path : `/${path}`}`;
}

function homepageServicesYaml(domain) {
  const label = (domain.split('.')[0] || 'app').replace(/[^a-zA-Z0-9_-]/g, '') || 'app';
  const title = label.charAt(0).toUpperCase() + label.slice(1);
  return `- ${title}:\n    href: https://${domain}\n    description: ""\n    icon: ""`;
}

function redirectStatusBadgeClass(code) {
  if (code === 301) return 'badge badge-warn';
  if (code === 302) return 'badge badge-green';
  return 'badge badge-gray';
}

async function copyToClipboard(text, toast) {
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    toast && toast('Copied to clipboard', 'ok');
  } catch {
    toast && toast('Copy failed — check browser permissions', 'err');
  }
}

const SETUP_BANNER_KEY = 'urler_setup_banner_dismissed';
const SERVICES_TOFU_BANNER_KEY = 'urler_services_tofu_banner_dismissed';

function ServiceCreatedChecklist({ created, integrations, toast }) {
  const domain = created.domain;
  const href = `https://${domain}`;
  const dockge = trimUrlBase(integrations?.dockge_url);
  const kuma = trimUrlBase(integrations?.uptime_kuma_url);
  const homepage = trimUrlBase(integrations?.homepage_url);
  const wiki = trimUrlBase(integrations?.wiki_url);
  const homepageYaml = homepageServicesYaml(domain);
  const kumaAdd = kuma ? integrationUrl(kuma, '/add') : '';
  const wikiNew = wiki ? `${wiki}/#New%20Tiddler` : '';

  return (
    <>
      <div className="section-label">Next steps</div>
      <p className="field-hint" style={{ marginBottom: '12px' }}>
        DNS and NPM are ready. Finish the homelab workflow below (links open in a new tab).
      </p>

      {dockge && (
        <div className="checklist-block">

function formatActivityEvent(ev) {
  const d = ev.detail || {};
  const map = {
    'config.updated': () => `Settings saved${d.configured ? '' : ' (not fully configured)'}`,
    'link.created': () => `Created short link /${d.slug || '?'}`,
    'link.updated': () => `Updated short link /${d.slug || '?'}`,
    'link.deleted': () => `Deleted short link item ${d.item_id || '?'}`,
    'dns.created': () => `Created DNS A record ${d.name || '?'}`,
    'dns.deleted': () => `Deleted DNS record ${d.record_id || '?'}`,
    'service.created': () => `Created service ${d.domain || '?'}`,
    'service.deleted': () => `Deleted service ${d.domain || '?'}`,
    'service.proxy_enabled': () => `Set proxy host #${d.proxy_host_id} ${d.enabled ? 'enabled' : 'disabled'}`,
    'service.batch_apply': () => `Batch import: ${d.created ?? 0} created, ${d.failed ?? 0} failed`,
    'service.restored_from_trash': () => `Restored service ${d.domain || '?'} from trash`,
    'reconcile.scan': () => `Reconcile scan: ${d.unmatched_dns ?? 0} unmatched DNS, ${d.missing_dns_services ?? 0} missing DNS`,
  };
  const fn = map[ev.action];
  return fn ? fn() : (ev.action || 'event');
}


// ── Toast notifications ───────────────────────────────────────────────────────

function useToast() {
  const [toasts, setToasts] = useState([]);
  // add() is stable (no deps) so panels can safely use it in useCallback deps.
  const add = useCallback((msg, type = 'ok') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return { toasts, add };
}

function ToastList({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
    </div>
  );
}

function ModalError({ error, onDismiss }) {

  return (

      {refreshing ? 'Refreshing…' : 'Refresh'}
    </button>

function useConfirm() {
  const [pending, setPending] = useState(null);
  const confirm = useCallback((opts) => new Promise((resolve) => {
    setPending({ ...opts, resolve });
  }), []);
  const dialog = pending ? (
    <ConfirmDialog
      title={pending.title}
      message={pending.message}
      confirmLabel={pending.confirmLabel || 'Confirm'}
      danger={pending.danger}
      requireText={pending.requireText}
      onConfirm={() => { pending.resolve(true); setPending(null); }}
      onCancel={() => { pending.resolve(false); setPending(null); }}
    />
  ) : null;
  return { confirm, dialog };
}

function ConfirmDialog({ title, message, confirmLabel, danger, requireText, onConfirm, onCancel }) {
  const [typed, setTyped] = useState('');
  useEffect(() => {
    const h = e => e.key === 'Escape' && onCancel();
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [onCancel]);
  const ok = !requireText || typed === requireText;
  return (
    <div className="overlay" style={{ zIndex: 110 }} onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="modal" role="dialog" aria-labelledby="confirm-title">
        <div className="modal-title" id="confirm-title">{title}</div>
        <div className="confirm-body">{message}</div>
        {requireText && (
          <div className="field confirm-input">
            <label>Type {requireText} to confirm</label>
            <input type="text" value={typed} autoFocus
              onChange={e => setTyped(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && ok && onConfirm()} />
          </div>
        )}
        <div className="modal-footer">
          <button type="button" className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button type="button" className={`btn ${danger ? 'btn-danger' : 'btn-primary'}`}
            disabled={!ok} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

function LoginScreen({ onAuthed, toast }) {
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    if (!password) return;
    setBusy(true);
    try {
      await api('POST', '/api/auth/login', { password });
      // Refresh CSRF token for subsequent unsafe requests
      try {
        const r = await fetch('/api/auth/status', { credentials: 'same-origin' });
        const s = await r.json();
        CSRF_TOKEN = s.csrf_token || '';
      } catch { /* ignore */ }
      onAuthed();
    } catch (e) {
      toast(e.message, 'err');
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="wizard-wrap">
      <div className="wizard" style={{ maxWidth: '420px' }}>
        <div className="wizard-brand">
          <span className="wizard-brand-icon">🔗</span>

            <div className="wizard-brand-title">URLER</div>
            <div className="wizard-brand-sub">Sign in to continue</div>
          </div>
        </div>
        <div className="field">
          <label>Console password</label>
          <input type="password" autoFocus value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && submit()} />
        </div>
        <div className="wizard-footer" style={{ borderTop: 'none', paddingTop: 0 }}>
          <button className="btn btn-primary" onClick={submit} disabled={busy || !password}>
            {busy ? 'Signing in…' : 'Sign in'}
          </button>
        </div>
      </div>
    </div>
  );
}

  const exportBackup = async () => {
    try {
      const r = await fetch('/api/config/export', { credentials: 'same-origin' });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.detail || r.statusText);
      }
      const blob = await r.blob();
      const u = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = u;
      a.download = 'urler-export.json';
      a.click();
      URL.revokeObjectURL(u);
      toast('Backup downloaded (masked secrets)', 'ok');
    } catch (e) {
      toast(e.message, 'err');
    }
  };

  if (!form) return (
    <div className="overlay">
      <div className="modal" style={{textAlign:'center',padding:'40px',color:'var(--text-3)',fontFamily:'var(--mono)',fontSize:'12px'}}>
        loading
      </div>
    </div>
  );

  return (
    <Modal title="Settings" onClose={onClose} wide>
      <ModalError error={saveError} onDismiss={() => setSaveError('')} />
      <ModalError error={testError} onDismiss={() => setTestError('')} />
      <ConfigForm form={form} setField={setField} consolePasswordOptional toast={toast} />
      <TestResults results={testResults} />
      <div className="modal-footer">
        <button type="button" className="btn btn-ghost" onClick={exportBackup}>Export backup (JSON)</button>
        <button className="btn btn-ghost" onClick={test} disabled={testing}>
          {testing ? 'Testing…' : 'Test Connections'}
        </button>
        <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={save} disabled={saving}>
          {saving ? 'Saving…' : 'Save Settings'}
        </button>
      </div>
    </Modal>
  );
}

function LinksPanel({ toast, onMutate }) {
  const { confirm, dialog: confirmDialog } = useConfirm();
  const [data, setData]       = useState(null);
  const [preflight, setPreflight] = useState(null);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [editTarget, setEditTarget] = useState('');
  const [slug, setSlug]       = useState('');
  const [target, setTarget]   = useState('');
  const [statusCode, setStatusCode] = useState(302);
  const [saving, setSaving]   = useState(false);
  const [addError, setAddError] = useState('');
  const [editError, setEditError] = useState('');
  const [linkFilter, setLinkFilter] = useState('');

  const load = useCallback(async (soft) => {
    if (soft) setRefreshing(true);
    else setLoading(true);
    try {
      const [linksRes, preRes] = await Promise.all([
        api('GET', '/api/links'),
        api('GET', '/api/links/preflight'),
      ]);
      setData(linksRes);
      setPreflight(preRes);
    } catch (e) { toast(e.message, 'err'); }
    finally { setLoading(false); setRefreshing(false); }
  }, [toast]);

  useEffect(() => { load(); }, [load]);

  const shortDomain = preflight?.short_domain || '';
  const shortHost = shortDomain.replace(/^https?:\/\//, '').split('/')[0] || 'short domain';

  const addLink = async () => {
    if (!slug || !target) return;
    setAddError('');
    if (!validateSlug(slug)) {
      setAddError('Slug must start with a letter or number and contain only lowercase letters, numbers, hyphens, or underscores');
      return;
    }
    if (!targetUrlOk(target)) {
      setAddError('Destination must start with https:// or http://');
      return;
    }
    setSaving(true);
    try {
      await api('POST', '/api/links', { slug, target, status_code: statusCode });
      toast(`/${slug} created (${statusCode})`, 'ok');
      setShowAdd(false); setSlug(''); setTarget(''); setStatusCode(302); setAddError('');
      load(true); onMutate();
    } catch (e) { setAddError(e.message); }
    finally { setSaving(false); }
  };

  const del = async (id, s, fullUrl) => {
    const ok = await confirm({
      title: 'Delete short link?',
      message: `Remove ${fullUrl || '/' + s}?\n\nVisitors will no longer be redirected to this slug.`,
      confirmLabel: 'Delete',
      danger: true,
    });
    if (!ok) return;
    try {
      await api('DELETE', `/api/links/${id}`);
      toast(`/${s} deleted`, 'ok');
      load(true); onMutate();
    } catch (e) { toast(e.message, 'err'); }
  };

  const openEdit = (item, s) => {
    setEditError('');
    setEditItem({ id: item.id, slug: s });
    setEditTarget(item.redirect?.target_url || '');
  };

  const saveEdit = async () => {
    if (!editItem || !editTarget) return;
    setEditError('');
    if (!targetUrlOk(editTarget)) {
      setEditError('Destination must start with https:// or http://');
      return;
    }
    setSaving(true);
    try {
      await api('PUT', `/api/links/${editItem.id}`, { target: editTarget });
      toast(
        `/${editItem.slug} updated. Browsers that visited this link before may cache the old redirect for a while.`,
        'ok',
      );
      setEditItem(null); setEditTarget('');
      load(true); onMutate();
    } catch (e) { setEditError(e.message); }
    finally { setSaving(false); }
  };

  const parseSlug = url => url?.replace(/^https?:\/\/[^/]+\//, '') || '';
  const items     = data?.items || [];
  const q = (linkFilter || '').trim().toLowerCase();
  const filtered = !q ? items : items.filter(item => {
    const s = parseSlug(item.redirect?.source_url);
    const t = (item.redirect?.target_url || '').toLowerCase();
    const u = shortLinkUrl(shortDomain, s).toLowerCase();
    return s.includes(q) || t.includes(q) || u.includes(q);
  });
  const slugOk = !slug || validateSlug(slug);
  const targetOk = !target || targetUrlOk(target);
  const nearQuota = items.length >= 18;
  const listTruncated = data?.truncated === true;

  return (
    <>
      {confirmDialog}
      <div className="panel-header">
        <div>
          <div className="panel-title">Short Links</div>
          <div className="panel-desc">{shortDomain
              ? <>Create, edit, and delete redirects on <span className="mono">{shortDomain}</span></>
              : 'Create, edit, and delete edge redirects (set Short Links Domain in Settings)'}</div>
        </div>
        <div className="panel-actions">
          <PanelRefreshButton onClick={() => load(true)} loading={loading} refreshing={refreshing} />
          {items.length > 0 && (
            <input className="toolbar-search" type="search" placeholder="Filter…" value={linkFilter}
              onChange={e => setLinkFilter(e.target.value)} aria-label="Filter links" />
          )}
          <button className="btn btn-primary"
            onClick={() => { setAddError(''); setStatusCode(302); setShowAdd(true); }}
            disabled={data !== null && (!data.list_exists || (preflight && !preflight.ready))}
            title={data !== null && !data.list_exists ? 'Run Tofu bootstrap first'
              : (preflight && !preflight.ready ? 'Fix setup issues below first' : undefined)}
          >+ New Link</button>
        </div>
      </div>

      {loading ? <div className="loading">loading</div>
      : data === null ? <div className="empty">Could not load links — check the backend logs.</div>
      : !data.list_exists ? (
        <div className="setup-notice">
          <h3>⚠ Tofu bootstrap required</h3>
          <p>The Cloudflare redirect list does not exist yet.<br/>
          From the repo, run <span className="mono">cd tofu &amp;&amp; tofu init &amp;&amp; tofu apply</span><br/>
          to create the list, ruleset, and short-domain DNS record, then refresh.</p>
          {preflight?.issues?.length > 0 && (
            <ul style={{ textAlign: 'left', maxWidth: '520px', margin: '16px auto 0', color: 'var(--text-3)', fontSize: '12px', fontFamily: 'var(--mono)', lineHeight: 1.7 }}>
              {preflight.issues.map((msg, i) => <li key={i}>{msg}</li>)}
            </ul>
          )}
        </div>
      ) : (
        <>
          {preflight && !preflight.ready && (
            <div className="setup-notice" style={{ marginBottom: '16px' }}>
              <h3>⚠ Short links may not work from the internet yet</h3>
              <p style={{ marginBottom: preflight.issues?.length ? '12px' : 0 }}>
                Fix the items below (often DNS proxying or the short domain in Settings), then refresh.
              </p>
              {preflight.issues?.length > 0 && (
                <ul style={{ textAlign: 'left', maxWidth: '520px', margin: '0 auto', color: 'var(--text-3)', fontSize: '12px', fontFamily: 'var(--mono)', lineHeight: 1.7 }}>
                  {preflight.issues.map((msg, i) => <li key={i}>{msg}</li>)}
                </ul>
              )}
            </div>
          )}
          {listTruncated && (
            <div className="quota-banner">
              Not all short links could be loaded (pagination limit). Some entries may be missing from this list.
            </div>
          )}
          {nearQuota && (
            <div className="quota-banner">
              You have {items.length} short links. Many Cloudflare free accounts are limited to 20 list items;
              if creation fails, contact Cloudflare support to raise your bulk redirect quota.
            </div>
          )}
          {items.length === 0 ? (
            <div className="empty">No short links yet. Add your first one.</div>
          ) : filtered.length === 0 ? (
            <div className="empty">No links match this filter.</div>
          ) : (
            <div className={`table-wrap ${refreshing ? 'table-dim' : ''}`}>
              <table>
                <thead><tr><th>Slug</th><th>Destination</th><th>Code</th><th></th></tr></thead>
                <tbody>
                  {filtered.map(item => {
                    const s = parseSlug(item.redirect?.source_url);
                    const t = item.redirect?.target_url;
                    const full = shortLinkUrl(shortDomain, s) || item.redirect?.source_url;
                    const code = item.redirect?.status_code ?? 302;
                    return (
                      <tr key={item.id}>
                        <td>
                          {full ? (
                            <a className="slug-link" href={full} target="_blank" rel="noreferrer" title={full}>/{s}</a>
                          ) : (
                            <span className="slug">/{s}</span>
                          )}
                        </td>
                        <td><div className="url-cell" title={t}>{t}</div></td>
                        <td>
                          <span className={redirectStatusBadgeClass(code)} title={redirectStatusHint(code) || undefined}>{code}</span>
                        </td>
                        <td className="td-actions td-actions-wide">
                          <span className="cell-action" style={{ justifyContent: 'flex-end' }}>
                            <button type="button" className="btn btn-ghost btn-sm" title="Copy short URL"
                              onClick={() => copyToClipboard(full, toast)}>Copy</button>
                            <button type="button" className="btn btn-ghost btn-sm" title="Open in new tab"
                              onClick={() => full && window.open(full, '_blank', 'noopener,noreferrer')}>Open</button>
                            <button type="button" className="btn btn-ghost btn-sm" onClick={() => openEdit(item, s)}>Edit</button>
                            <button type="button" className="btn btn-danger btn-sm" onClick={() => del(item.id, s, full)}>Delete</button>
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </>
      )}

      {showAdd && (
        <Modal title="New Short Link" onClose={() => { setShowAdd(false); setAddError(''); setStatusCode(302); }}>
          <ModalError error={addError} onDismiss={() => setAddError('')} />
          <div className="field">
            <label>Slug</label>
            <div className="field-prefix">
              <span className="field-pre">{shortHost}/</span>
              <input className={slug && !slugOk ? 'input-invalid' : ''} type="text" placeholder="ha" value={slug} autoFocus
                onChange={e => setSlug(e.target.value.toLowerCase().replace(/[^a-z0-9\-_]/g, ''))} />
            </div>
            {slug && !slugOk && <div className="field-err">Invalid slug format</div>}
            <div className="field-hint">Lowercase letters, numbers, hyphens, underscores</div>
          </div>
          <div className="field">
            <label>Destination URL</label>
            <input className={target && !targetOk ? 'input-invalid' : ''} type="text" placeholder="https://ha.yourdomain.com" value={target}
              onChange={e => setTarget(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addLink()} />
            {target && !targetOk && <div className="field-err">Must start with https:// or http://</div>}
            <div className="field-hint">Must start with https:// or http://</div>
          </div>
          <div className="field">
            <label>Redirect status</label>
            <select value={statusCode} onChange={e => setStatusCode(Number(e.target.value))}
              style={{ width: '100%', background: 'var(--bg)', border: '1px solid var(--border2)', color: 'var(--text)', borderRadius: 'var(--radius)', padding: '8px 10px', fontFamily: 'var(--mono)', fontSize: '12px' }}>
              {REDIRECT_STATUS_OPTIONS.map(c => (
                <option key={c} value={c}>{c}{c === 302 ? ' (recommended)' : ''}</option>
              ))}
            </select>
            <div className="field-hint">{redirectStatusHint(statusCode)}</div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-ghost" onClick={() => setShowAdd(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={addLink} disabled={saving || !slug || !target || !slugOk || !targetOk}>
              {saving ? 'Creating…' : 'Create Link'}
            </button>
          </div>
        </Modal>
      )}

      {editItem && (
        <Modal title={`Edit /${editItem.slug}`} onClose={() => { setEditItem(null); setEditError(''); }}>
          <ModalError error={editError} onDismiss={() => setEditError('')} />
          <div className="field-hint" style={{ marginBottom: '12px' }}>
            Short URL: <span className="mono">{shortLinkUrl(shortDomain, editItem.slug)}</span>
          </div>
          <div className="field">
            <label>Destination URL</label>
            <input type="text" placeholder="https://example.com" value={editTarget}
              className={editTarget && !targetUrlOk(editTarget) ? 'input-invalid' : ''}
              onChange={e => setEditTarget(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && saveEdit()} />
            {editTarget && !targetUrlOk(editTarget) && <div className="field-err">Must start with https:// or http://</div>}
            <div className="field-hint">Must start with https:// or http://. Browsers may cache old redirects for repeat visitors.</div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-ghost" onClick={() => setEditItem(null)}>Cancel</button>
            <button className="btn btn-primary" onClick={saveEdit} disabled={saving || !editTarget || !targetUrlOk(editTarget)}>
              {saving ? 'Saving…' : 'Save'}
            </button>
          </div>
        </Modal>
      )}
    </>
  );
}

function TablePager({ page, pageSize, total, onPage }) {
  if (total <= pageSize) return null;
  const pages = Math.max(1, Math.ceil(total / pageSize));
  const start = page * pageSize + 1;
  const end = Math.min(total, (page + 1) * pageSize);
  return (
    <div className="table-pager">
      <span>Showing {start}–{end} of {total}</span>
      <div className="table-pager-actions">
        <button type="button" className="btn btn-ghost btn-sm" disabled={page <= 0} onClick={() => onPage(page - 1)}>Previous</button>
        <button type="button" className="btn btn-ghost btn-sm" disabled={page >= pages - 1} onClick={() => onPage(page + 1)}>Next</button>
      </div>
    </div>
  );
}

function DNSPanel({ toast, onMutate }) {
  const { confirm, dialog: confirmDialog } = useConfirm();
  const [records, setRecords] = useState(null);
  const [dnsTruncated, setDnsTruncated] = useState(false);
  const [shortDomain, setShortDomain] = useState('');
  const [baseDomain, setBaseDomain] = useState('');
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [addError, setAddError] = useState('');
  const [name, setName]       = useState('');
  const [ip, setIp]           = useState('');
  const [proxied, setProxied] = useState(false);
  const [saving, setSaving]   = useState(false);
  const [dnsFilter, setDnsFilter] = useState('');
  const [dnsPage, setDnsPage] = useState(0);
  const [npmProxyDomains, setNpmProxyDomains] = useState(() => new Set());

  const load = useCallback(async (soft) => {
    if (soft) setRefreshing(true);
    else setLoading(true);
    try {
      const [dns, cfg] = await Promise.all([
        api('GET', '/api/dns'),
        api('GET', '/api/config'),
      ]);
      setRecords(dns.records || []);
      setDnsTruncated(!!dns.truncated);
      setShortDomain((cfg.short_domain || '').toLowerCase());
      setBaseDomain(cfg.domain || '');
      setNpmProxyDomains(new Set((dns.npm_proxy_domains || []).map(x => (x || '').toLowerCase())));
    }
    catch (e) { toast(e.message, 'err'); }
    finally { setLoading(false); setRefreshing(false); }
  }, [toast]);

  useEffect(() => { load(); }, [load]);

  const domainSuffix = baseDomain ? `.${baseDomain}` : '.yourdomain.com';

  const add = async () => {
    if (!name) return;
    setAddError('');
    setSaving(true);
    try {
      await api('POST', '/api/dns', { name, content: ip || undefined, proxied });
      toast(`${name} created`, 'ok');
      setShowAdd(false); setName(''); setIp(''); setProxied(false); setAddError('');
      load(true); onMutate();
    } catch (e) { setAddError(e.message); }
    finally { setSaving(false); }
  };

  const isShortRecord = (name) => {
    if (!shortDomain) return false;
    return (name || '').toLowerCase() === shortDomain;
  };

  const del = async (id, n) => {
    if (isShortRecord(n)) {
      const ok = await confirm({
        title: 'Delete short-links domain?',
        message: `This is your short-links domain record (${n}). Deleting it will break short links until restored.`,
        confirmLabel: 'Delete',
        danger: true,
        requireText: 'DELETE',
      });
      if (!ok) return;
    } else if (npmProxyDomains.has((n || '').toLowerCase())) {
      const ok = await confirm({
        title: 'Active NPM proxy host',
        message: `${n} has an active NPM proxy host. Use the Services tab to delete both together, or the service will be broken.`,
        confirmLabel: 'Delete DNS only',
        danger: true,
        requireText: 'DELETE',
      });
      if (!ok) return;
    } else {
      const ok = await confirm({
        title: 'Delete DNS record?',
        message: `Remove the A record for ${n}?`,
        confirmLabel: 'Delete',
        danger: true,
      });
      if (!ok) return;
    }
    try {
      await api('DELETE', `/api/dns/${id}`);
      toast(`${n} deleted`, 'ok');
      load(true); onMutate();
    } catch (e) { toast(e.message, 'err'); }
  };

  const dq = (dnsFilter || '').trim().toLowerCase();
  const recs = records || [];
  const filteredDns = !dq ? recs : recs.filter(r =>
    (r.name || '').toLowerCase().includes(dq) || (r.content || '').toLowerCase().includes(dq),
  );
  const dnsPageCount = Math.max(1, Math.ceil(filteredDns.length / DNS_PAGE_SIZE));
  const safeDnsPage = Math.min(dnsPage, dnsPageCount - 1);
  useEffect(() => { setDnsPage(0); }, [dq]);
  useEffect(() => {
    if (dnsPage !== safeDnsPage) setDnsPage(safeDnsPage);
  }, [dnsPage, safeDnsPage]);
  const pagedDns = filteredDns.slice(safeDnsPage * DNS_PAGE_SIZE, (safeDnsPage + 1) * DNS_PAGE_SIZE);

  return (
    <>
      {confirmDialog}
      <div className="panel-header">
        <div>
          <div className="panel-title">DNS Records</div>
          <div className="panel-desc">View, add, and delete A records for your zone</div>
        </div>
        <div className="panel-actions">
          <PanelRefreshButton onClick={() => load(true)} loading={loading} refreshing={refreshing} />
          <input className="toolbar-search" type="search" placeholder="Filter…" value={dnsFilter}
            onChange={e => setDnsFilter(e.target.value)} aria-label="Filter DNS records" />
          <button className="btn btn-primary" onClick={() => { setAddError(''); setShowAdd(true); }}>+ New Record</button>
        </div>
      </div>

      {dnsTruncated && (
        <div className="quota-banner">
          Not all DNS records could be loaded (pagination limit). Some A records may be missing from this list.
        </div>
      )}

      {loading ? <div className="loading">loading</div>
      : records === null ? <div className="empty">Could not load DNS records — check the backend logs.</div>
      : records.length === 0 ? <div className="empty">No A records found.</div>
      : filteredDns.length === 0 ? (
        <div className="empty">No records match this filter.</div>
      ) : (
        <>
        <div className={`table-wrap ${refreshing ? 'table-dim' : ''}`}>
          <table>
            <thead><tr><th>Name</th><th>IP</th><th>Proxied</th><th></th></tr></thead>
            <tbody>
              {pagedDns.map(r => (
                <tr key={r.id}>
                  <td>
                    <span className="mono">{r.name}</span>
                    {isShortRecord(r.name) && (
                      <span className="badge badge-warn" style={{ marginLeft: '8px' }}>short-domain</span>
                    )}
                  </td>
                  <td><span className="ip-cell">{r.content}</span></td>
                  <td><span className={`badge ${r.proxied ? 'badge-blue' : 'badge-gray'}`}>
                    {r.proxied ? 'proxied' : 'dns only'}
                  </span></td>
                  <td className="td-actions">
                    <button className="btn btn-danger btn-sm" onClick={() => del(r.id, r.name)}>✕</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <TablePager page={safeDnsPage} pageSize={DNS_PAGE_SIZE} total={filteredDns.length} onPage={setDnsPage} />
        </>
      )}

      {showAdd && (
        <Modal title="New DNS A Record" onClose={() => { setShowAdd(false); setAddError(''); }}>
          <ModalError error={addError} onDismiss={() => setAddError('')} />
          <div className="field">
            <label>Subdomain</label>
            <div className="field-prefix">
              <input type="text" placeholder="myservice" value={name} autoFocus
                onChange={e => setName(e.target.value.toLowerCase().replace(/[^a-z0-9.\-]/g, ''))} />
              <span className="field-suf">{domainSuffix}</span>
            </div>
            <div className="field-hint">
              Bare subdomain or full FQDN — both accepted.<br/>
              Leave IP empty to default to your NPM host. Use 192.0.2.1 for Cloudflare-only redirect targets.
            </div>
          </div>
          <div className="field">
            <label>IP Address</label>
            <input type="text" placeholder="(defaults to NPM host)"
              value={ip} onChange={e => setIp(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && add()} />
          </div>
          <div className="field">
            <label className="check-row label-plain">
              <input type="checkbox" checked={proxied} onChange={e => setProxied(e.target.checked)} />
              <span>Proxied through Cloudflare</span>
            </label>
          </div>
          <div className="modal-footer">
            <button className="btn btn-ghost" onClick={() => setShowAdd(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={add} disabled={saving || !name}>
              {saving ? 'Creating…' : 'Create Record'}
            </button>
          </div>
        </Modal>
      )}
    </>
  );
}


// ── Services Panel ────────────────────────────────────────────────────────────
// Shows /api/scan: NPM proxy hosts cross-referenced with DNS records.
